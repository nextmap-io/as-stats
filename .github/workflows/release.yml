name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}/as-stats

jobs:
  # ──────────────────────────────────────────────
  # Run tests before releasing
  # ──────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
      - run: go test ./... -race

  # ──────────────────────────────────────────────
  # Build Go binaries for multiple platforms
  # ──────────────────────────────────────────────
  build-binaries:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
        binary: [collector, api]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          VERSION=${GITHUB_REF_NAME}
          go build \
            -ldflags="-s -w -X main.version=${VERSION}" \
            -o as-stats-${{ matrix.binary }}-${{ matrix.goos }}-${{ matrix.goarch }} \
            ./cmd/${{ matrix.binary }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: as-stats-${{ matrix.binary }}-${{ matrix.goos }}-${{ matrix.goarch }}
          path: as-stats-${{ matrix.binary }}-${{ matrix.goos }}-${{ matrix.goarch }}

  # ──────────────────────────────────────────────
  # Build frontend
  # ──────────────────────────────────────────────
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
      - name: Archive frontend
        run: tar -czf ../frontend-dist.tar.gz -C dist .
      - uses: actions/upload-artifact@v7
        with:
          name: frontend-dist
          path: frontend-dist.tar.gz

  # ──────────────────────────────────────────────
  # Build and push Docker images
  # ──────────────────────────────────────────────
  docker:
    name: Docker Images
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        image:
          - { name: collector, dockerfile: Dockerfile.collector }
          - { name: api, dockerfile: Dockerfile.api }
          - { name: frontend, dockerfile: Dockerfile.frontend }
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.image.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.image.dockerfile }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ──────────────────────────────────────────────
  # Create GitHub Release with all artifacts
  # ──────────────────────────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, build-frontend, docker]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          # Rename and make binaries executable
          for dir in artifacts/as-stats-*; do
            name=$(basename "$dir")
            cp "$dir"/* "release/${name}" 2>/dev/null || true
            chmod +x "release/${name}" 2>/dev/null || true
          done
          # Copy frontend archive
          cp artifacts/frontend-dist/frontend-dist.tar.gz release/ 2>/dev/null || true
          # Generate checksums
          cd release && sha256sum * > checksums.txt

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --pretty=format:"- %s" HEAD)
          else
            CHANGELOG=$(git log --pretty=format:"- %s" "${PREV_TAG}..HEAD")
          fi
          echo "changelog<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGELOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body: |
            ## Changes

            ${{ steps.changelog.outputs.changelog }}

            ## Docker Images

            ```bash
            docker pull ${{ env.IMAGE_PREFIX }}-collector:${{ github.ref_name }}
            docker pull ${{ env.IMAGE_PREFIX }}-api:${{ github.ref_name }}
            docker pull ${{ env.IMAGE_PREFIX }}-frontend:${{ github.ref_name }}
            ```

            ## Quick Start

            ```bash
            # Download docker-compose files
            curl -LO https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/docker-compose.yml
            curl -LO https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/docker-compose.prod.yml
            curl -LO https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/.env.example
            cp .env.example .env

            # Start
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            ```
          files: release/*
