name: Bug Report
description: Report a bug in AS-Stats
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: What happened?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See error ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of AS-Stats is affected?
      options:
        - Collector (flow reception)
        - API (backend)
        - Frontend (UI)
        - ClickHouse (storage/queries)
        - Docker / Deployment
        - Documentation
    validations:
      required: true

  - type: dropdown
    id: flow_protocol
    attributes:
      label: Flow Protocol
      description: If related to flow collection, which protocol?
      options:
        - NetFlow v5
        - NetFlow v9
        - IPFIX
        - sFlow v5
        - N/A

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Version, OS, router model, etc.
      placeholder: |
        - AS-Stats version: v1.0.0
        - OS: Ubuntu 24.04
        - Docker: 27.0.3
        - Router: Cisco IOS-XE 17.x
      render: markdown

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant log output.
      render: shell
