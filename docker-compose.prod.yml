# Production overrides
# Usage: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# Uses pre-built images from GHCR instead of building locally.
# Set IMAGE_TAG to a specific version (default: latest).
#
# IMPORTANT: Set strong credentials in .env before deploying:
#   CLICKHOUSE_PASSWORD=<random-32-char>
#   AUTH_ENABLED=true
#   OIDC_ISSUER_URL=...
#   OIDC_CLIENT_ID=...
#   OIDC_CLIENT_SECRET=...

services:
  clickhouse:
    restart: unless-stopped
    # Remove public port exposure — only accessible within Docker network
    ports: !override []
    environment:
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD}"
    volumes:
      - clickhouse_data:/var/lib/clickhouse
      - clickhouse_logs:/var/log/clickhouse-server
    deploy:
      resources:
        limits:
          memory: 8G

  redis:
    restart: unless-stopped
    # Remove public port exposure
    ports: !override []
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --requirepass "${REDIS_PASSWORD:-changeme}"
    environment:
      REDIS_PASSWORD: "${REDIS_PASSWORD:-changeme}"
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$REDIS_PASSWORD\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5

  collector:
    image: ghcr.io/nextmap-io/as-stats-collector:${IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD}"
    deploy:
      resources:
        limits:
          memory: 2G

  api:
    image: ghcr.io/nextmap-io/as-stats-api:${IMAGE_TAG:-latest}
    restart: unless-stopped
    # Remove public port exposure — frontend proxies to API
    ports: !override []
    environment:
      CLICKHOUSE_PASSWORD: "${CLICKHOUSE_PASSWORD}"
      AUTH_ENABLED: "${AUTH_ENABLED:-false}"
      OIDC_ISSUER_URL: "${OIDC_ISSUER_URL:-}"
      OIDC_CLIENT_ID: "${OIDC_CLIENT_ID:-}"
      OIDC_CLIENT_SECRET: "${OIDC_CLIENT_SECRET:-}"
      OIDC_REDIRECT_URL: "${OIDC_REDIRECT_URL:-}"
      OIDC_SCOPES: "${OIDC_SCOPES:-openid profile email}"
      API_CORS_ORIGINS: "${API_CORS_ORIGINS:-https://asstats.example.com}"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-changeme}@redis:6379/0"
    deploy:
      resources:
        limits:
          memory: 1G

  frontend:
    image: ghcr.io/nextmap-io/as-stats-frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "80:80"

volumes:
  clickhouse_data:
  clickhouse_logs:
  redis_data:
